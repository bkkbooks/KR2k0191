body:
  text: 沙州記龍涸六月二十六日發龍涸晝夜肅肅常寒不復得脫𥜗袴將從七十二人面盡黎黑目唇青瘀白馬關龍涸北四十里有白馬關關甚嶮峻使十八人固險雖萬夫亦不能前河厲吐谷渾於河上作橋謂之河厲長一百五十步勾欄甚嚴飾洮木洮水出強臺山又曰山東即洮水源山南即墊江源也麻壘抱罕城西有麻壘壘中可容萬衆仇池山仇池山號百頃上有百頃池壁立百仞一人守道萬夫莫回鳥鼠鳥鼠同穴山鳥如冢雀色小白鼠小黃而無尾凡同穴地皆肥沃壤盡軟熟如人耕多生黃花紫草
